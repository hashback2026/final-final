<!DOCTYPE html>
<html>
<head>
  <title>Bulk STK Push</title>
</head>
<body>
<h2>Bulk STK Push</h2>

<textarea id="phones" placeholder="2547XXXXXXXX,2547XXXXXXXX"></textarea><br>
<input type="number" id="amount" placeholder="Amount"><br>
<input type="text" id="reference" placeholder="Reference"><br>
<input type="text" id="description" placeholder="Description"><br>

<button onclick="send()">Send</button>

<pre id="out"></pre>

<script>
async function send(){
  const res = await fetch('/stk',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      phones: document.getElementById('phones').value,
      amount: document.getElementById('amount').value,
      reference: document.getElementById('reference').value,
      description: document.getElementById('description').value
    })
  });
  const data = await res.json();
  document.getElementById('out').innerText = JSON.stringify(data,null,2);
}
</script>

</body>
</html>
